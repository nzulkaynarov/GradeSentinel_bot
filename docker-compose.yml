services:
  bot:
    build: .
    container_name: gradesentinel_bot
    restart: always
    volumes:
      - sentinel_data:/app/data
      - ./config:/app/config

volumes:
  sentinel_data:
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
