faq_label: { other: "05 · Questions" }
faq_h: { other: "What parents <span class=\"italic-display\" style=\"color: var(--ink-3);\">usually</span> ask first." }
faq_q1: { other: "Where does the bot get grades from?" }
faq_a1: { other: "From the electronic diary the school runs in Google Sheets. The bot reads the sheet through a Google service account and compares it to the previous state to find new and updated grades. We don't use any other sources; no school system login needed." }
faq_q2: { other: "Is it safe? What can you see in our sheets?" }
faq_a2: { other: "The bot has read-only access only to the sheet you added yourself. Dashboard authorization uses a Telegram signature (HMAC-SHA256); we're not connected to the school cabinet at all." }
faq_q3: { other: "What if the teacher updates a grade later?" }
faq_a3: { other: "The bot notices the change within 5 minutes and sends «was 3 → now 4». Change history is kept in the dashboard — disputes are easy to resolve." }
faq_q4: { other: "I have two kids in different schools. Can both be connected?" }
faq_a4: { other: "Yes, up to 5 kids per family — each with their own sheet, one-tap switching in Telegram. One parent can be in several families: e.g., one with their spouse and one with their parents." }
faq_q5: { other: "How do I cancel the subscription?" }
faq_a5: { other: "You don't — it simply expires on the date, no auto-renewal or unexpected charges. The bot reminds you 3 days before the end and offers to renew if you want." }

