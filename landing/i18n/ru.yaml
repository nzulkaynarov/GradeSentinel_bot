# === FAQ ===
faq_label: { other: "05 · Вопросы" }
faq_h: { other: "То, что родители <span class=\"italic-display\" style=\"color: var(--ink-3);\">обычно</span> спрашивают первым." }
faq_q1: { other: "Откуда бот берёт оценки?" }
faq_a1: { other: "Из электронного дневника, который ведёт школа в Google Таблицах. Бот читает таблицу через сервисный аккаунт Google и сравнивает её с предыдущим состоянием — так находит новые и изменённые оценки. Никаких других источников не используем; учётной записи школьного журнала нам не нужно." }
faq_q2: { other: "Это безопасно? Что вы видите в наших таблицах?" }
faq_a2: { other: "У бота есть доступ только на чтение и только к той таблице, ссылку на которую вы добавили сами. Авторизация в дашборде идёт через подпись Telegram (HMAC-SHA256), к школьному кабинету ребёнка мы вообще не подключены." }
faq_q3: { other: "Что будет, если учитель исправит оценку задним числом?" }
faq_a3: { other: "Бот заметит изменение в течение 5 минут и пришлёт «было 3 → стало 4». История правок сохраняется в дашборде — спорные ситуации легко восстанавливать." }
faq_q4: { other: "У меня двое детей в разных школах. Подключатся оба?" }
faq_a4: { other: "Да, до 5 детей в одной семье — каждому своя таблица, в Telegram переключение в один клик. Один родитель может состоять в нескольких семьях: например, в семье с супругом и в семье со своими родителями." }
faq_q5: { other: "Как отменить подписку?" }
faq_a5: { other: "Никак — она просто заканчивается в указанную дату, без автопродления и списаний. За три дня до окончания бот напомнит и предложит продлить, если нужно." }

