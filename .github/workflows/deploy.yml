name: Deploy to VPS

# ГЕЙТ НА ТЕСТЫ (B2): деплой НЕ триггерится напрямую на push:main.
# Вместо этого ждёт завершения workflow "Tests" (tests.yml) и запускается
# ТОЛЬКО если он зелёный. Так красные тесты блокируют выкатку в прод.
#
# ВАЖНО: workflow_run запускается в контексте default-ветки, а checkout по
# умолчанию берёт её HEAD — поэтому явно чекаутим ИМЕННО тот SHA, который
# прошёл тесты (github.event.workflow_run.head_sha).
#
# Плюс к этому в настройках репозитория нужно включить branch protection
# «Require status checks to pass before merging» → Tests (это НЕ в коде,
# см. deploy/README.md и описание PR).
on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

# Не даём двум деплоям пересекаться — иначе .new/.old-каталоги атомарного
# свапа могут наехать друг на друга.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    # Запускаемся ТОЛЬКО если Tests завершился успехом на ветке main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    # Self-hosted runner живёт на VPS под юзером 'deploy'.
    # 'deploy' имеет узкий passwordless sudo (см. deploy/deploy-sudoers).

    steps:
      - name: Checkout протестированного коммита
        uses: actions/checkout@v4
        with:
          # Деплоим РОВНО тот commit, что прошёл тесты, а не текущий HEAD main.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Записать секреты в /etc/gradesentinel/
        run: |
          # Создать директорию (идемпотентно через install -d)
          sudo /usr/bin/install -d -o gradesentinel -g gradesentinel -m 0750 /etc/gradesentinel

          # bot.env — все ENV переменные. atomic write через tee + chmod/chown
          sudo /usr/bin/tee /etc/gradesentinel/bot.env > /dev/null <<EOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          ADMIN_ID=${{ secrets.ADMIN_ID }}
          ADMIN_GROUP_ID=${{ secrets.ADMIN_GROUP_ID }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          WEBAPP_URL=${{ secrets.WEBAPP_URL }}
          CLICK_PROVIDER_TOKEN=${{ secrets.CLICK_PROVIDER_TOKEN }}
          PAYME_PROVIDER_TOKEN=${{ secrets.PAYME_PROVIDER_TOKEN }}
          PAYMENT_CARD_NUMBER=${{ secrets.PAYMENT_CARD_NUMBER }}
          PAYMENT_CARD_HOLDER=${{ secrets.PAYMENT_CARD_HOLDER }}
          STARS_ENABLED=${{ secrets.STARS_ENABLED }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          ENVIRONMENT=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF
          sudo /usr/bin/chmod 0640 /etc/gradesentinel/bot.env
          sudo /usr/bin/chown root:gradesentinel /etc/gradesentinel/bot.env

          # credentials.json — heredoc с одиночными кавычками, чтобы $ внутри JSON
          # не интерполировался шеллом
          sudo /usr/bin/tee /etc/gradesentinel/credentials.json > /dev/null <<'CREDS_EOF'
          ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          CREDS_EOF
          sudo /usr/bin/chmod 0640 /etc/gradesentinel/credentials.json
          sudo /usr/bin/chown root:gradesentinel /etc/gradesentinel/credentials.json

      # ── Атомарный деплой (B19) ────────────────────────────────────────
      # Раньше rsync --delete шёл ПРЯМО в живой /opt/gradesentinel → прерывание
      # оставляло полусостояние и restart-луп без отката. Теперь:
      #   stage (.new) → venv+deps из lock → smoke-компиляция → atomic mv → restart.
      # Прошлый релиз сохраняется в /opt/gradesentinel.old для быстрого отката.
      - name: Stage — синхронизировать код в /opt/gradesentinel.new
        run: |
          # Чистим возможный хвост от прерванного прошлого деплоя (идемпотентно).
          sudo /usr/bin/rm -rf /opt/gradesentinel.new
          # rsync исключает venv (собираем per-release ниже), .git, data/config,
          # .github/tests. Живой /opt/gradesentinel не трогается — при обрыве
          # rsync портится только staging, прод продолжает работать.
          sudo /usr/bin/rsync -a --delete \
            --exclude=venv --exclude=.git \
            --exclude=data --exclude=config \
            --exclude=.github --exclude=tests \
            "${GITHUB_WORKSPACE}/" /opt/gradesentinel.new/
          sudo /usr/bin/chown -R gradesentinel:gradesentinel /opt/gradesentinel.new

      - name: Stage — собрать per-release venv строго из requirements.lock
        run: |
          # Свежий venv внутри релиза → релиз самодостаточен. Ставим из lock с
          # проверкой хешей — в прод приезжает РОВНО проверенный CI набор (B18).
          # (откат вернёт код и ровно те зависимости, что соответствуют коду).
          sudo -u gradesentinel /usr/bin/python3.12 -m venv /opt/gradesentinel.new/venv
          sudo -u gradesentinel /opt/gradesentinel.new/venv/bin/pip install --upgrade pip
          sudo -u gradesentinel /opt/gradesentinel.new/venv/bin/pip install --require-hashes -r /opt/gradesentinel.new/requirements.lock

      - name: Smoke — компиляция нового кода ДО переключения
        run: |
          # Ловим синтаксис/битые модули на новом коде+venv, пока прод ещё
          # крутит старый релиз. Падение здесь = деплой красный, прод цел.
          sudo -u gradesentinel /opt/gradesentinel.new/venv/bin/python -m compileall -q /opt/gradesentinel.new/src /opt/gradesentinel.new/webapp

      - name: Switch — атомарно переключить релиз
        run: |
          # Освобождаем слот отката и свапаем каталоги (rename в пределах одной
          # ФС атомарен). Окно «нет /opt/gradesentinel» между двумя mv —
          # доли секунды, сервисы в этот момент ещё не рестартятся.
          sudo /usr/bin/rm -rf /opt/gradesentinel.old
          sudo /usr/bin/mv /opt/gradesentinel /opt/gradesentinel.old
          sudo /usr/bin/mv /opt/gradesentinel.new /opt/gradesentinel

      - name: Обновить systemd-юниты и Caddyfile
        run: |
          # Если в репо изменились юниты — переустанавливаем
          sudo /usr/bin/install -m 0644 /opt/gradesentinel/deploy/gradesentinel-bot.service /etc/systemd/system/gradesentinel-bot.service
          sudo /usr/bin/install -m 0644 /opt/gradesentinel/deploy/gradesentinel-webapp.service /etc/systemd/system/gradesentinel-webapp.service
          sudo /usr/bin/install -m 0644 /opt/gradesentinel/deploy/gradesentinel-heartbeat.service /etc/systemd/system/gradesentinel-heartbeat.service
          sudo /usr/bin/install -m 0644 /opt/gradesentinel/deploy/gradesentinel-heartbeat.timer /etc/systemd/system/gradesentinel-heartbeat.timer
          # Мультитенантный VPS: пишем ТОЛЬКО свой фрагмент в conf.d/grades.caddy.
          # Мастер /etc/caddy/Caddyfile (глобальный блок + import conf.d/*.caddy)
          # создаётся один раз в install.sh и деплоем НЕ трогается — иначе затрём
          # чужие сайты (b2b.railtech.uz). Каталог conf.d уже создан install.sh.
          sudo /usr/bin/install -m 0644 /opt/gradesentinel/deploy/Caddyfile /etc/caddy/conf.d/grades.caddy

          sudo /usr/bin/caddy validate --config /etc/caddy/Caddyfile
          sudo /usr/bin/systemctl daemon-reload
          sudo /usr/bin/systemctl reload caddy.service

      - name: Включить и перезапустить сервисы
        run: |
          sudo /usr/bin/systemctl enable gradesentinel-bot.service
          sudo /usr/bin/systemctl enable gradesentinel-webapp.service
          sudo /usr/bin/systemctl enable gradesentinel-heartbeat.timer

          sudo /usr/bin/systemctl restart gradesentinel-bot.service
          sudo /usr/bin/systemctl restart gradesentinel-webapp.service

      - name: Smoke check + авто-откат при провале
        run: |
          # Дать сервисам секунд 8 на старт
          sleep 8

          ok=1
          sudo /usr/bin/systemctl is-active gradesentinel-bot.service || ok=0
          sudo /usr/bin/systemctl is-active gradesentinel-webapp.service || ok=0

          if [ "$ok" = "1" ]; then
            # WebApp /health через локальный loopback — Caddy не нужен для этого теста
            health=0
            for i in 1 2 3 4 5; do
              if curl -fsS http://127.0.0.1:8443/health > /dev/null; then
                health=1
                break
              fi
              sleep 2
            done
            [ "$health" = "1" ] || ok=0
          fi

          if [ "$ok" != "1" ]; then
            echo "Smoke провалился — откатываемся на предыдущий релиз (.old)"
            # Возвращаем свап: битый релиз → .new, прошлый (.old) → живой.
            sudo /usr/bin/mv /opt/gradesentinel /opt/gradesentinel.new
            sudo /usr/bin/mv /opt/gradesentinel.old /opt/gradesentinel
            sudo /usr/bin/systemctl restart gradesentinel-bot.service
            sudo /usr/bin/systemctl restart gradesentinel-webapp.service
            echo "Откат выполнен. Деплой помечаем красным."
            exit 1
          fi

          echo "Deploy OK — WebApp /health отвечает, сервисы active"
