name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main # Деплой только при пуше в основную ветку

jobs:
  deploy:
    runs-on: self-hosted # Команда GitHub'у использовать твою малину

    steps:
      - name: Очистка старых root-файлов базы перед checkout
        run: |
          # data/ и config/ могут остаться root-owned после Docker bind-mount'ов.
          # Без этого checkout/файловые операции в следующих шагах падают с EACCES.
          sudo rm -rf data/ config/ .env || true

      - name: Перенос файлов репозитория
        uses: actions/checkout@v4

      - name: Создание конфигурационных файлов из секретов
        run: |
          # На случай если "Очистка" не удалила leftover'ы (sudo без пароля
          # может быть не настроен) — пробуем ещё раз без sudo. После checkout
          # rm на gitignored config/ безопасен.
          rm -rf .env config/ 2>/dev/null || true

          mkdir -p config

          cat > .env <<EOF
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          ADMIN_ID=${{ secrets.ADMIN_ID }}
          ADMIN_GROUP_ID=${{ secrets.ADMIN_GROUP_ID }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          WEBAPP_URL=${{ secrets.WEBAPP_URL }}
          WEBAPP_PORT=${{ secrets.WEBAPP_PORT }}
          EOF

          # heredoc с одиночными кавычками — не интерполирует $ внутри JSON.
          cat > config/credentials.json <<'CREDS_EOF'
          ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          CREDS_EOF

      - name: Сборка и перезапуск Docker

        run: |
          docker compose down || true
          docker compose up -d --build
