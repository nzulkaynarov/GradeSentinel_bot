name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Версия должна совпадать с прод (Ubuntu 24.04 на 3.12) — иначе CI
          # не ловит 3.12-specific баги, а прод врезается в них впервые.
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          # BOT_TOKEN формата с ':' — bot_instance.py exit(1) при невалидном.
          # Старые тесты (без импорта handlers/) этого не требовали, но новые
          # тесты handler'ов (test_ai_chat_handler_history, test_streaming)
          # импортируют src.handlers.ai_chat → bot_instance.
          BOT_TOKEN: '12345:ci-test-token'
          ADMIN_ID: '0'
          ADMIN_GROUP_ID: '0'
        run: pytest tests/ -v
