name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    # PostgreSQL service — тесты идут против PG (миграция с SQLite, 2026-06-29).
    # Без DATABASE_URL conftest.py пропускает ВСЕ БД-тесты → ложно-зелёный CI.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: gs
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gstest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gs -d gstest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Версия должна совпадать с прод (Ubuntu 24.04 на 3.12) — иначе CI
          # не ловит 3.12-specific баги, а прод врезается в них впервые.
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Ставим строго из lock (B18) с проверкой хешей — CI гоняет РОВНО тот
          # набор версий, что уедет в прод. requirements.txt остаётся как
          # «source» верхнеуровневых зависимостей; requirements.lock —
          # фактически устанавливаемый (regenerate: см. requirements.lock header).
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Run pytest
        env:
          # Схему поднимает conftest.py (init_db → alembic upgrade head) при наличии
          # DATABASE_URL; без него БД-тесты молча скипались бы (ложная безопасность).
          DATABASE_URL: postgresql://gs:test@localhost:5432/gstest
          # BOT_TOKEN формата с ':' — bot_instance.py exit(1) при невалидном.
          # Новые тесты handler'ов импортируют src.handlers.ai_chat → bot_instance.
          BOT_TOKEN: '12345:ci-test-token'
          ADMIN_ID: '0'
          ADMIN_GROUP_ID: '0'
        run: pytest tests/ -v
