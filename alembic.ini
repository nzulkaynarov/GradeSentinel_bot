# Alembic config for GradeSentinel (PostgreSQL).
# sqlalchemy.url НЕ задаётся здесь — берётся из ENV в migrations/env.py
# (DATABASE_URL / PG*), чтобы не коммитить секреты.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Логирование
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
