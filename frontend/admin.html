<link rel="stylesheet" href="assets/theme.css">
<style>
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 18px 20px; }
  .stat .label { font-size: 12px; color: var(--ink-500); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .stat .value { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-top: 6px; }
  .stat .delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; margin-top: 6px; color: var(--ok); }
  .stat .delta.down { color: var(--bad); }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .panel-head h3 { font-size: 15px; }
  .panel-body { padding: 20px; }
  .panel-body.tight { padding: 0; }

  .grid-2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

  /* Table */
  table.adm { width: 100%; border-collapse: separate; border-spacing: 0; }
  table.adm th { text-align: left; padding: 12px 20px; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); background: var(--surface-2); border-bottom: 1px solid var(--line); }
  table.adm td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--line-2); }
  table.adm tr:last-child td { border-bottom: none; }
  table.adm tr:hover td { background: var(--surface-2); }
  table.adm .id { font-family: var(--mono); font-size: 12px; color: var(--ink-400); }

  /* Search */
  .search-input { position: relative; display: flex; align-items: center; }
  .search-input input { padding-left: 38px; height: 38px; width: 280px; }
  .search-input svg { position: absolute; left: 12px; color: var(--ink-400); }

  /* Bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 160px; padding: 10px 0; }
  .bar { flex: 1; background: linear-gradient(180deg, var(--brand), var(--brand-700)); border-radius: 4px 4px 0 0; min-height: 4px; position: relative; transition: height .3s; }
  .bar:hover { background: linear-gradient(180deg, #6dc7e7, var(--brand)); }
  .bar-label { font-size: 10px; color: var(--ink-400); text-align: center; margin-top: 6px; }

  /* Activity */
  .act-item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--line-2); align-items: flex-start; }
  .act-item:last-child { border-bottom: none; }
  .act-ic { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
  .act-text { font-size: 13px; line-height: 1.5; flex: 1; }
  .act-text b { color: var(--ink-900); font-weight: 600; }
  .act-time { font-size: 11px; color: var(--ink-400); margin-top: 2px; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(12,31,38,.5);
    backdrop-filter: blur(4px); z-index: 200;
    display: grid; place-items: center;
  }
  .modal {
    background: #fff; border-radius: var(--r-xl);
    width: 520px; max-width: 90vw; max-height: 86vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-h { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .modal-h h3 { font-size: 18px; }
  .modal-h button { background: transparent; border: none; cursor: pointer; color: var(--ink-400); font-size: 22px; line-height: 1; }
  .modal-b { padding: 24px; }
  .modal-f { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
  .tab { padding: 12px 20px; border: none; background: transparent; font-size: 14px; font-weight: 600; color: var(--ink-500); border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; }
  .tab:hover { color: var(--ink-900); }
  .tab.active { color: var(--ink-900); border-bottom-color: var(--ink-900); }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar .grow { flex: 1; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink-900); color: #fff;
    padding: 14px 18px; border-radius: 12px;
    box-shadow: var(--shadow-lg); z-index: 300;
    display: flex; gap: 10px; align-items: center;
    font-size: 14px; font-weight: 500;
    animation: slideIn .3s;
  }
  .toast .check { background: var(--ok); width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* Health */
  .health-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line-2); }
  .health-row:last-child { border-bottom: none; }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .health-dot.ok { background: var(--ok); box-shadow: 0 0 0 4px rgba(21,128,61,.15); }
  .health-dot.warn { background: var(--warn); box-shadow: 0 0 0 4px rgba(217,119,6,.15); }
  .health-dot.bad { background: var(--bad); box-shadow: 0 0 0 4px rgba(185,28,28,.15); }
  .health-name { font-size: 14px; font-weight: 600; flex: 1; }
  .health-val { font-size: 13px; color: var(--ink-500); font-family: var(--mono); }

  /* Inline action button */
  .ia-btn { background: transparent; border: 1px solid var(--line); height: 28px; width: 28px; border-radius: 6px; display: inline-grid; place-items: center; cursor: pointer; color: var(--ink-500); transition: all .15s; }
  .ia-btn:hover { color: var(--ink-900); border-color: var(--ink-300); }
  .ia-btn.danger:hover { color: var(--bad); border-color: var(--bad); }

  @media (max-width: 1100px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>

              <div className="panel">
                <div className="panel-head"><h3>Глобальные настройки</h3></div>
                <div className="panel-body" style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div><label className="field-label">Интервал опроса дневников (сек)</label><input className="field" defaultValue="300"/></div>
                  <div><label className="field-label">Тихие часы — начало</label><input className="field" defaultValue="22:00"/></div>
                  <div><label className="field-label">Тихие часы — конец</label><input className="field" defaultValue="07:00"/></div>
                  <div><label className="field-label">Архивация оценок (дней)</label><input className="field" defaultValue="180"/></div>
                  <button className="btn btn-primary" style={{alignSelf:"flex-start"}} onClick={()=>showToast("Настройки сохранены")}>Сохранить</button>
                </div>
              </div>
              <div className="panel">
                <div className="panel-head"><h3>Цены тарифов (UZS)</h3></div>
                <div className="panel-body" style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div><label className="field-label">1 месяц</label><input className="field" defaultValue="29900"/></div>
                  <div><label className="field-label">3 месяца</label><input className="field" defaultValue="79900"/></div>
                  <div><label className="field-label">12 месяцев</label><input className="field" defaultValue="249900"/></div>
                  <button className="btn btn-primary" style={{alignSelf:"flex-start"}} onClick={()=>showToast("Цены обновлены — изменения видны в боте сразу")}>Сохранить</button>
                </div>
              </div>
            </div>
          )}
        </main>
      </div>

      {/* Modal: invoice / new family */}
      {showInvoice && (
        <div className="modal-bg" onClick={()=>setShowInvoice(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-h"><h3>Создать семью</h3><button onClick={()=>setShowInvoice(false)}>×</button></div>
            <div className="modal-b" style={{display:"flex",flexDirection:"column",gap:14}}>
              <div><label className="field-label">Название семьи</label><input className="field" placeholder="Каримовы"/></div>
              <div><label className="field-label">Telegram ID главы</label><input className="field" placeholder="100231"/></div>
              <div><label className="field-label">Тариф (опционально)</label>
                <select className="field"><option value="">Без подписки</option><option>Trial 7 дней</option><option>1 месяц</option><option>3 месяца</option><option>12 месяцев</option></select>
              </div>
            </div>
            <div className="modal-f">
              <button className="btn btn-ghost" onClick={()=>setShowInvoice(false)}>Отмена</button>
              <button className="btn btn-primary" onClick={()=>{setShowInvoice(false); showToast("Семья создана");}}>Создать</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal: broadcast */}
      {showBroadcast && (
        <div className="modal-bg" onClick={()=>setShowBroadcast(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-h"><h3>Быстрая рассылка</h3><button onClick={()=>setShowBroadcast(false)}>×</button></div>
            <div className="modal-b">
              <p className="muted" style={{fontSize:14, marginBottom:14}}>Отправит сообщение всем 1 247 пользователям. ~50 секунд.</p>
              <textarea className="field" style={{height:120,padding:"12px 14px"}} placeholder="Текст сообщения..."/>
            </div>
            <div className="modal-f">
              <button className="btn btn-ghost" onClick={()=>setShowBroadcast(false)}>Отмена</button>
              <button className="btn btn-primary" onClick={()=>{setTab("broadcast"); setShowBroadcast(false);}}>Полный редактор</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div className="toast">
          <div className="check"><Icon name="check" size={14} style={{color:"#fff"}}/></div>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp/>);
</script>

</body>
</html>
